# ~/.config/lxqt/waylandwindowmanagers.conf
#
# Full list of Wayland compositors supported by LXQt. The upstream default
# ships labwc here, but a stale auto-created user file with only
# `[General] __userfile__=true` and no [KnownManagers] makes LXQt components
# (globalkeys, panel backend helpers) believe the compositor is unsupported.
# Keeping the complete list with __userfile__=true guarantees labwc is
# recognized regardless of merge/replace semantics.

[General]
__userfile__=true

[KnownManagers]

Hyprland/Name=Hyprland
Hyprland/Comment=Independent, highly customizable, dynamic tiling Wayland compositor

kwin_wayland/Name=KWin-Wayland
kwin_wayland/Comment=Window manager of the KDE Software Compilation

labwc/Name=Labwc
labwc/Comment=wlroots-based window-stacking compositor, inspired by openbox

niri/Name=niri
niri/Comment=A scrollable-tiling Wayland compositor

river/Name=River
river/Comment=Dynamic tiling Wayland compositor

sway/Name=Sway
sway/Comment=i3-compatible, tiling Wayland compositor

wayfire/Name=Wayfire
wayfire/Comment=3D Wayland compositor, inspired by Compiz and based on wlroots
