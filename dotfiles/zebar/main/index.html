<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Main Widget</title>
</head>
<body>
    <div id="bar">
        <div id="left">
            <span id="workspaces"></span>
        </div>
        <div id="center">
            <span id="clock"></span>
        </div>
        <div id="right">
            <span id="battery"></span>
            <span id="cpu"></span>
            <span id="memory"></span>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // In a real Zebar widget, you'd use Zebar's API to get system info.
        // For now, let's just simulate some data.
        function updateSystemInfo() {
            document.getElementById('cpu').innerText = 'CPU: 15%';
            document.getElementById('memory').innerText = 'MEM: 2.4GB';
        }
        updateSystemInfo();
        setInterval(updateSystemInfo, 5000);
    </script>
</body>
</html>
