<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'JetBrains Mono', monospace;
            background: transparent;
            color: #ffffff;
        }
        
        .minimalist-bar {
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .status-item {
            transition: all 0.2s ease;
        }
        
        .status-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-1px);
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
    <title>Minimalist Status Bar</title>
</head>
<body>
    <div class="minimalist-bar h-10 px-3 flex items-center gap-4 text-xs">
        <div class="status-item px-2 py-1 rounded flex items-center gap-2">
            <span class="text-yellow-400">🕐</span>
            <span id="clock" class="font-medium">00:00:00</span>
        </div>
        
        <div class="text-gray-600">|</div>
        
        <div class="status-item px-2 py-1 rounded flex items-center gap-2">
            <span class="text-green-400">💾</span>
            <span id="memory" class="font-mono">--%</span>
        </div>
        
        <div class="status-item px-2 py-1 rounded flex items-center gap-2">
            <span class="text-blue-400">💻</span>
            <span id="cpu" class="font-mono">--%</span>
        </div>
        
        <div class="status-item px-2 py-1 rounded flex items-center gap-2">
            <span class="text-purple-400">📡</span>
            <span id="network" class="font-mono">-- Mbps</span>
        </div>
        
        <div class="status-item px-2 py-1 rounded flex items-center gap-2">
            <span id="battery-icon" class="text-orange-400">🔋</span>
            <span id="battery" class="font-mono">--%</span>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                now.toLocaleTimeString('en-US', { hour12: false });
        }
        
        function updateSystemInfo() {
            const cpu = Math.floor(Math.random() * 100);
            const memory = Math.floor(Math.random() * 100);
            const network = Math.floor(Math.random() * 100);
            const battery = Math.floor(Math.random() * 100);
            
            document.getElementById('cpu').textContent = `${cpu}%`;
            document.getElementById('memory').textContent = `${memory}%`;
            document.getElementById('network').textContent = `${network} Mbps`;
            document.getElementById('battery').textContent = `${battery}%`;
            
            if (battery >= 80) document.getElementById('battery-icon').textContent = '🔋';
            else if (battery >= 50) document.getElementById('battery-icon').textContent = '⚡';
            else if (battery >= 20) document.getElementById('battery-icon').textContent = '⚠️';
            else document.getElementById('battery-icon').textContent = '🪫';
            
            if (cpu > 80) document.getElementById('cpu').classList.add('pulse');
            else document.getElementById('cpu').classList.remove('pulse');
            
            if (memory > 90) document.getElementById('memory').classList.add('pulse');
            else document.getElementById('memory').classList.remove('pulse');
        }
        
        updateClock();
        updateSystemInfo();
        
        setInterval(updateClock, 1000);
        setInterval(updateSystemInfo, 3000);
    </script>
</body>
</html>
