<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
            background: transparent;
            font-size: 11px;
            line-height: 1;
        }
        
        .compact-bar {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: 24px;
            padding: 0 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
        }
        
        .compact-item {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.15s ease;
            white-space: nowrap;
        }
        
        .compact-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-dot.good { background: #10b981; }
        .status-dot.warning { background: #f59e0b; }
        .status-dot.critical { background: #ef4444; }
    </style>
    <title>Compact Status Bar</title>
</head>
<body>
    <div class="compact-bar">
        <div class="compact-item">
            <span id="clock-time" class="text-gray-300 font-mono">00:00</span>
            <span id="clock-ampm" class="text-gray-500 text-xs">--</span>
        </div>
        
        <div class="compact-item">
            <div id="cpu-dot" class="status-dot good"></div>
            <span id="cpu-label" class="text-gray-400">CPU</span>
            <span id="cpu-value" class="text-blue-400 font-mono">--%</span>
        </div>
        
        <div class="compact-item">
            <div id="mem-dot" class="status-dot good"></div>
            <span id="mem-label" class="text-gray-400">MEM</span>
            <span id="mem-value" class="text-green-400 font-mono">--%</span>
        </div>
        
        <div class="compact-item">
            <div id="net-dot" class="status-dot good"></div>
            <span id="net-label" class="text-gray-400">NET</span>
            <span id="net-value" class="text-purple-400 font-mono">--</span>
        </div>
        
        <div class="compact-item">
            <div id="bat-dot" class="status-dot good"></div>
            <span id="bat-value" class="text-orange-400 font-mono">--%</span>
        </div>
        
        <div class="text-gray-700">·</div>
        
        <div class="compact-item">
            <span id="wifi-indicator" class="text-gray-500">📶</span>
            <span id="audio-indicator" class="text-gray-500">🔊</span>
            <span id="bluetooth-indicator" class="text-gray-500">📱</span>
        </div>
    </div>

    <script>
        function updateCompactClock() {
            const now = new Date();
            document.getElementById('clock-time').textContent = 
                now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('clock-ampm').textContent = 
                now.toLocaleTimeString('en-US', { hour12: true }).split(' ')[1];
        }
        
        function updateCompactStatus() {
            const cpu = Math.floor(Math.random() * 100);
            const mem = Math.floor(Math.random() * 100);
            const net = Math.floor(Math.random() * 100);
            const bat = Math.floor(Math.random() * 100);
            
            document.getElementById('cpu-value').textContent = `${cpu}%`;
            const cpuDot = document.getElementById('cpu-dot');
            cpuDot.className = 'status-dot ' + (cpu > 80 ? 'critical' : cpu > 60 ? 'warning' : 'good');
            
            document.getElementById('mem-value').textContent = `${mem}%`;
            const memDot = document.getElementById('mem-dot');
            memDot.className = 'status-dot ' + (mem > 90 ? 'critical' : mem > 70 ? 'warning' : 'good');
            
            document.getElementById('net-value').textContent = net > 50 ? `${net} Mb/s` : `${net} Kb/s`;
            const netDot = document.getElementById('net-dot');
            netDot.className = 'status-dot ' + (net > 80 ? 'critical' : net > 40 ? 'warning' : 'good');
            
            document.getElementById('bat-value').textContent = `${bat}%`;
            const batDot = document.getElementById('bat-dot');
            batDot.className = 'status-dot ' + (bat > 20 ? 'good' : 'critical');
            
            document.getElementById('wifi-indicator').textContent = 
                net > 80 ? '📶' : net > 40 ? '📶📶' : '📶📶📶';
            document.getElementById('audio-indicator').textContent = 
                cpu > 70 ? '🔊' : '🔇';
            document.getElementById('bluetooth-indicator').textContent = 
                bat > 10 ? '📱' : '📴';
        }
        
        updateCompactClock();
        updateCompactStatus();
        
        setInterval(updateCompactClock, 60000);
        setInterval(updateCompactStatus, 2000);
    </script>
</body>
</html>
