name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-linux-musl
          - aarch64-linux-musl
          - riscv64-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwayland-dev \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            libcairo2-dev \
            libtesseract-dev \
            libleptonica-dev \
            libglib2.0-dev \
            libgio2.0-cil-dev \
            libgobject2.0-cil-dev

      - name: Build
        run: |
          zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/ocws* dist/
          tar -czf ocws-${{ matrix.target }}.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocws-${{ matrix.target }}
          path: ocws-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release ${{ github.run_number }}
          body: |
            ## OCWS Release

            Pre-built binaries for multiple architectures:
            - x86_64 Linux (musl)
            - aarch64 Linux (musl)
            - riscv64 Linux (musl)

            ### Installation
            ```bash
            # Download and extract
            tar -xzf ocws-x86_64-linux-musl.tar.gz
            sudo cp ocws* /usr/local/bin/
            ```
          files: |
            artifacts/**/*.tar.gz
          draft: false
          prerelease: false
