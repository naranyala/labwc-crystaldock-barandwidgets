# MangoWM Configuration
# Enhanced configuration with crystal-dock as primary dock

# Autostart
exec-once=/usr/bin/crystal-dock --start --overlay
exec-once=swaybg -i /usr/share/backgrounds/sway/Sway_Wallpaper_Blue_Large.png

# Keybindings - Common
keymode=common
bind=SUPER,R,reload_config
bind=SUPER,Q,killclient
bind=SUPER,M,quit

# Keybindings - Default
keymode=default
bind=SUPER,Return,spawn,foot
bind=SUPER,D,spawn,rofi -show drun
bind=SUPER,E,togglefloating
bind=SUPER,F,togglefullscreen
bind=SUPER,Space,toggleoverview

# Focus and Movement
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down

# Tags and Workspaces
bind=ALT,1,view,1
bind=ALT,2,view,2
bind=ALT,3,view,3
bind=ALT,4,view,4
bind=ALT,5,view,5
bind=ALT,6,view,6
bind=ALT,7,view,7
bind=ALT,8,view,8
bind=ALT,9,view,9

bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

# Layouts
bind=SUPER,S,switch_layout
bind=SUPER,comma,incgaps,+5
bind=SUPER,period,incgaps,-5

# Media Controls
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause

# Configuration sections for other components
# Uncomment and configure as needed

# Layout configurations (separate files)
# include=config/mango/config/layouts.conf

# Window rules (separate file)
# include=config/mango/config/window_rules.conf

