# MangoWM Keybindings Configuration
# Common keybindings
common:
  - key: "SUPER + R"
    action: "reload_config"
    description: "Reload MangoWM configuration"
  - key: "SUPER + Q"
    action: "killclient"
    description: "Kill focused client"
  - key: "SUPER + M"
    action: "quit"
    description: "Quit MangoWM"

# Default keybindings

default:
  - key: "SUPER + Return"
    action: "spawn"
    parameter: "foot"
    description: "Spawn terminal (foot)"
  - key: "SUPER + D"
    action: "spawn"
    parameter: "rofi -show drun"
    description: "Spawn application launcher (rofi)"
  - key: "SUPER + E"
    action: "togglefloating"
    description: "Toggle floating state"
  - key: "SUPER + F"
    action: "togglefullscreen"
    description: "Toggle fullscreen"
  - key: "SUPER + Space"
    action: "toggleoverview"
    description: "Toggle overview mode"

# Focus and movement
focus:
  - key: "SUPER + Left"
    action: "focusdir"
    parameter: "left"
    description: "Focus window to the left"
  - key: "SUPER + Right"
    action: "focusdir"
    parameter: "right"
    description: "Focus window to the right"
  - key: "SUPER + Up"
    action: "focusdir"
    parameter: "up"
    description: "Focus window above"
  - key: "SUPER + Down"
    action: "focusdir"
    parameter: "down"
    description: "Focus window below"

# Window manipulation
window_manipulation:
  - key: "SUPER + SHIFT + Left"
    action: "exchange_client"
    parameter: "left"
    description: "Exchange client position with left neighbor"
  - key: "SUPER + SHIFT + Right"
    action: "exchange_client"
    parameter: "right"
    description: "Exchange client position with right neighbor"
  - key: "SUPER + SHIFT + Up"
    action: "exchange_client"
    parameter: "up"
    description: "Exchange client position with neighbor above"
  - key: "SUPER + SHIFT + Down"
    action: "exchange_client"
    parameter: "down"
    description: "Exchange client position with neighbor below"

# Tag and workspace management
tag:
  - key: "ALT + 1"
    action: "view"
    parameter: "1"
    description: "Switch to tag 1"
  - key: "ALT + 2"
    action: "view"
    parameter: "2"
    description: "Switch to tag 2"
  - key: "ALT + 3"
    action: "view"
    parameter: "3"
    description: "Switch to tag 3"
  - key: "ALT + 4"
    action: "view"
    parameter: "4"
    description: "Switch to tag 4"
  - key: "ALT + 5"
    action: "view"
    parameter: "5"
    description: "Switch to tag 5"
  - key: "ALT + 6"
    action: "view"
    parameter: "6"
    description: "Switch to tag 6"
  - key: "ALT + 7"
    action: "view"
    parameter: "7"
    description: "Switch to tag 7"
  - key: "ALT + 8"
    action: "view"
    parameter: "8"
    description: "Switch to tag 8"
  - key: "ALT + 9"
    action: "view"
    parameter: "9"
    description: "Switch to tag 9"

# Tag assignment
tag_assignment:
  - key: "SUPER + SHIFT + 1"
    action: "tag"
    parameter: "1"
    description: "Assign focused window to tag 1"
  - key: "SUPER + SHIFT + 2"
    action: "tag"
    parameter: "2"
    description: "Assign focused window to tag 2"
  - key: "SUPER + SHIFT + 3"
    action: "tag"
    parameter: "3"
    description: "Assign focused window to tag 3"
  - key: "SUPER + SHIFT + 4"
    action: "tag"
    parameter: "4"
    description: "Assign focused window to tag 4"
  - key: "SUPER + SHIFT + 5"
    action: "tag"
    parameter: "5"
    description: "Assign focused window to tag 5"
  - key: "SUPER + SHIFT + 6"
    action: "tag"
    parameter: "6"
    description: "Assign focused window to tag 6"
  - key: "SUPER + SHIFT + 7"
    action: "tag"
    parameter: "7"
    description: "Assign focused window to tag 7"
  - key: "SUPER + SHIFT + 8"
    action: "tag"
    parameter: "8"
    description: "Assign focused window to tag 8"
  - key: "SUPER + SHIFT + 9"
    action: "tag"
    parameter: "9"
    description: "Assign focused window to tag 9"

# Layout management
layout:
  - key: "SUPER + S"
    action: "switch_layout"
    description: "Switch to next layout"
  - key: "SUPER + Comma"
    action: "incgaps"
    parameter: "+5"
    description: "Increase gaps by 5"
  - key: "SUPER + Period"
    action: "incgaps"
    parameter: "-5"
    description: "Decrease gaps by 5"

# Media controls
media:
  - key: "NONE + XF86AudioRaiseVolume"
    action: "spawn"
    parameter: "wpctl set-volume @DEFAULT_SINK@ 5%+"
    description: "Increase volume by 5%"
  - key: "NONE + XF86AudioLowerVolume"
    action: "spawn"
    parameter: "wpctl set-volume @DEFAULT_SINK@ 5%-"
    description: "Decrease volume by 5%"
  - key: "NONE + XF86AudioMute"
    action: "spawn"
    parameter: "wpctl set-mute @DEFAULT_SINK@ toggle"
    description: "Toggle mute"
  - key: "NONE + XF86AudioNext"
    action: "spawn"
    parameter: "playerctl next"
    description: "Next track"
  - key: "NONE + XF86AudioPrev"
    action: "spawn"
    parameter: "playerctl previous"
    description: "Previous track"
  - key: "NONE + XF86AudioPlay"
    action: "spawn"
    parameter: "playerctl play-pause"
    description: "Play/pause"
